<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freddie Fierce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="crt"></div>
  <div class="vignette"></div>

  <main class="monitor">
    <section id="start" class="start">
      <h1>FREDDIE FIERCE UNIVERSE</h1>
      <p>v1.000</p>
      <button id="startBtn">ENTER WEBSITE</button>
      <small>harder, faster, louder</small>
    </section>

    <section id="boot" class="boot hidden">
      <header>
        <span>FREDDIE FIERCE NETWORK OS v2.003</span>
        <span>BOOT SEQUENCE INITIATED</span>
      </header>

      <img src="logo.png" class="logo" alt="Freddie Fierce Logo">

      <h2>INITIALISING UNDERGROUND PROTOCOLS...</h2>

      <div id="lines" class="lines"></div>

      <div class="progress">
        <div id="bar"></div>
      </div>

      <div id="percent">0%</div>

      <button id="enterBtn" class="enter hidden">ENTER THE UNDERGROUND</button>

      <div class="clock">00:00:08:48</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
