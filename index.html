<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freddie Fierce Network v2.003</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="crt"></div>

  <main class="boot-screen">
    <div class="window-bar">
      <span>FREDDIE FIERCE NETWORK v2.003</span>
      <span>▁ ▢ ✕</span>
    </div>

    <section class="loading-box">
      <h1>LOADING...</h1>

      <div class="logo-placeholder">FF</div>

      <p class="status">CONNECTING TO FREDDIEFIERCE.COM</p>

      <div class="progress-frame">
        <div class="progress-bar"></div>
      </div>

      <div class="terminal">
        <p id="line1">PLEASE WAIT...</p>
        <p id="line2">ESTABLISHING CONNECTION...</p>
        <p id="line3">INITIALIZING SEQUENCERS...</p>
      </div>

      <button id="enterBtn" class="hidden">ENTER THE UNDERGROUND</button>
    </section>

    <footer>
      © 2003 FREDDIE FIERCE. BEST VIEWED IN 1024 × 768
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
